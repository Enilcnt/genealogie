<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mémoires — Arbre Généalogique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="app">
  <header id="header">
    <div class="header-inner">
      <a class="site-brand" href="index.html">
        <span class="site-title">MÉMOIRES</span>
        <span class="site-sub">Arbre généalogique</span>
      </a>
      <nav class="header-nav">
        <a href="index.html" class="nav-link active">Arbre</a>
        <a href="saisie.html" class="nav-add">+ Ajouter</a>
      </nav>
      <div class="search-wrap">
        <input id="search" type="text" placeholder="Rechercher…" autocomplete="off"/>
        <ul id="search-results"></ul>
      </div>
      <div class="legend">
        <span class="leg"><span class="leg-line parent"></span>Filiation</span>
        <span class="leg"><span class="leg-union">●</span>Union</span>
        <span class="leg"><span class="leg-line sibling"></span>Fratrie</span>
      </div>
    </div>
  </header>

  <div id="graph-container">
    <svg id="graph"></svg>
    <div id="zoom-btns">
      <button id="btn-in">+</button>
      <button id="btn-reset" style="font-size:.65rem">⌖</button>
      <button id="btn-out">−</button>
    </div>
    <div id="loading-overlay"><div class="spinner"></div><p>Chargement…</p></div>
    <div id="empty-state">
      <p>L'arbre est vide.</p>
      <a href="saisie.html" class="btn-primary" style="margin-top:12px">Ajouter la première personne →</a>
    </div>
  </div>

  <aside id="panel" class="panel-closed">
    <button id="panel-close">✕</button>
    <div id="panel-content"></div>
  </aside>
  <div id="overlay"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy }
                          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { FIREBASE_CONFIG } from './firebase-config.js';

const app = initializeApp(FIREBASE_CONFIG);
const db  = getFirestore(app);
const $   = id => document.getElementById(id);

/* ══════════════════════════════════════
   CONSTANTES
══════════════════════════════════════ */
const R       = 26;   // rayon nœud personne
const UR      = 5;    // rayon nœud union ●
const MIN_SP  = 140;  // espace entre nœuds frères
const FAM_GAP = 80;   // espace entre familles
const ROW_H   = 160;  // hauteur entre générations
const PAD_T   = 60;
const STROKE  = { parent:'#2b2b28', married:'#2b2b28', sibling:'#c0beb6' };

let allPersons=[], allLinks=[];
let svgSel, zoomGroup, zoomBeh, focusId=null;

/* ══════════════════════════════════════
   CHARGEMENT
══════════════════════════════════════ */
async function loadData(){
  const [pS,lS] = await Promise.all([
    getDocs(query(collection(db,'persons'),orderBy('name'))),
    getDocs(collection(db,'links'))
  ]);
  allPersons = pS.docs.map(d=>({id:d.id,...d.data()}));
  allLinks   = lS.docs.map(d=>({id:d.id,...d.data()}));
  $('loading-overlay').style.display='none';
  if(!allPersons.length){ $('empty-state').style.display='flex'; return; }
  buildSearch();
  const last = localStorage.getItem('memoires-focus');
  const startId = (last && allPersons.find(p=>p.id===last)) ? last : findRoot();
  renderTree(startId);
}

function findRoot(){
  const hasParent = new Set(allLinks.filter(l=>l.type==='parent').map(l=>l.target));
  const roots = allPersons.filter(p=>!hasParent.has(p.id));
  roots.sort((a,b)=>(a.generation||5)-(b.generation||5));
  return roots[0]?.id || allPersons[0]?.id;
}

/* ══════════════════════════════════════
   CONSTRUCTION DU GRAPHE FOCALISÉ

   Règles :
   1. Ancêtres directs de focusId → FULL (opacité 1)
   2. Frères/sœurs de chaque ancêtre → DIM (opacité 0.3), sans leurs descendants
   3. Conjoints des ancêtres → FULL
   4. Conjoints des frères/sœurs → DIM
   5. Descendants directs de focusId → FULL
   6. Frères/sœurs de focusId → FULL
   7. "..." pour les descendants des branches DIM
══════════════════════════════════════ */
function buildScene(fid){
  const pMap={};
  allPersons.forEach(p=>pMap[p.id]=p);

  const parentsOf={}, childrenOf={}, spouseOf={};
  allLinks.forEach(l=>{
    if(l.type==='parent'){
      (parentsOf[l.target]=parentsOf[l.target]||[]).push(l.source);
      (childrenOf[l.source]=childrenOf[l.source]||[]).push(l.target);
    }
    if(l.type==='married'){spouseOf[l.source]=l.target;spouseOf[l.target]=l.source;}
  });

  // Collecter les ancêtres directs de focusId
  const directAncestors = new Set();
  function collectAnc(id){
    directAncestors.add(id);
    const sp=spouseOf[id]; if(sp) directAncestors.add(sp);
    (parentsOf[id]||[]).forEach(pid=>collectAnc(pid));
  }
  collectAnc(fid);

  // Collecter descendants directs de focusId (+ leurs conjoints)
  const directDesc = new Set();
  function collectDesc(id){
    directDesc.add(id);
    const sp=spouseOf[id]; if(sp) directDesc.add(sp);
    (childrenOf[id]||[]).forEach(cid=>collectDesc(cid));
  }
  collectDesc(fid);

  // Frères/sœurs de focusId → FULL
  const focusSibs = new Set();
  (parentsOf[fid]||[]).forEach(pid=>{
    (childrenOf[pid]||[]).forEach(sid=>{
      focusSibs.add(sid);
      const sp=spouseOf[sid]; if(sp) focusSibs.add(sp);
    });
  });

  // Frères/sœurs des ancêtres (pas focusId lui-même) → DIM
  const dimSibs = new Set();
  directAncestors.forEach(aid=>{
    if(directDesc.has(aid)||focusSibs.has(aid)) return;
    (parentsOf[aid]||[]).forEach(pid=>{
      (childrenOf[pid]||[]).forEach(sid=>{
        if(directAncestors.has(sid)) return; // déjà en full
        dimSibs.add(sid);
        const sp=spouseOf[sid]; if(sp) dimSibs.add(sp);
      });
    });
  });

  // Ensemble visible avec leur état
  const nodes = new Map(); // id → {person, dim, hasDimChildren}
  const addNode=(id,dim)=>{
    if(!pMap[id]) return;
    if(!nodes.has(id)) nodes.set(id,{person:pMap[id],dim,hasDimChildren:false});
    else if(!dim) nodes.get(id).dim=false; // full > dim
  };

  directAncestors.forEach(id=>addNode(id,false));
  directDesc.forEach(id=>addNode(id,false));
  focusSibs.forEach(id=>addNode(id,false));
  dimSibs.forEach(id=>addNode(id,true));

  // Marquer les nœuds dim qui ont des enfants (pour afficher "...")
  dimSibs.forEach(id=>{
    if((childrenOf[id]||[]).length>0){
      const n=nodes.get(id); if(n) n.hasDimChildren=true;
    }
  });

  return {nodes, parentsOf, childrenOf, spouseOf, pMap, fid};
}

/* ══════════════════════════════════════
   PLACEMENT
   Chaque union entre deux parents génère
   un nœud union ● dont les enfants descendent.
══════════════════════════════════════ */
function computeLayout(scene){
  const {nodes, parentsOf, childrenOf, spouseOf, pMap} = scene;
  const visIds = [...nodes.keys()];

  // Couples → enfants (parmi visibles)
  const coupleChildren={}, coupleOf={};
  visIds.forEach(cid=>{
    const parents=(parentsOf[cid]||[]).filter(pid=>nodes.has(pid));
    if(!parents.length) return;
    const p1=parents[0];
    const sp=spouseOf[p1];
    const p2=(sp&&nodes.has(sp))?sp:null;
    const key=p2?[p1,p2].sort().join('|'):p1+'|solo';
    if(!coupleChildren[key]) coupleChildren[key]=[];
    if(!coupleChildren[key].includes(cid)) coupleChildren[key].push(cid);
    coupleOf[cid]=key;
  });

  // Trier enfants par birthOrder
  Object.keys(coupleChildren).forEach(k=>{
    coupleChildren[k].sort((a,b)=>{
      const pa=pMap[a],pb=pMap[b];
      return((pa?.birthOrder||999)-(pb?.birthOrder||999))||
             ((pa?.birth||'').localeCompare(pb?.birth||''));
    });
  });

  const genMin=Math.min(...visIds.map(id=>nodes.get(id)?.person?.generation||1));
  const genY=g=>PAD_T+(g-genMin)*ROW_H+R;

  // Regrouper par génération
  const famsByGen={}, lonelyByGen={};
  Object.entries(coupleChildren).forEach(([key,children])=>{
    if(!children.length)return;
    const g=nodes.get(children[0])?.person?.generation||1;
    (famsByGen[g]=famsByGen[g]||[]).push({key,children});
  });
  visIds.forEach(id=>{
    if(!coupleOf[id]){
      const g=nodes.get(id)?.person?.generation||1;
      (lonelyByGen[g]=lonelyByGen[g]||[]).push(id);
    }
  });

  const sortedGens=[...new Set(visIds.map(id=>nodes.get(id)?.person?.generation||1))].sort((a,b)=>a-b);
  const famW=fam=>Math.max((fam.children.length-1)*MIN_SP,0)+MIN_SP;
  const genTW=gen=>{
    const fams=famsByGen[gen]||[], lone=lonelyByGen[gen]||[];
    let w=0;
    fams.forEach((f,i)=>{w+=famW(f);if(i<fams.length-1)w+=FAM_GAP;});
    if(lone.length)w+=(lone.length-1)*MIN_SP+MIN_SP+(fams.length?FAM_GAP:0);
    return w;
  };
  const totalW=Math.max(...sortedGens.map(genTW),500)+200;
  const pos={};

  // Phase 1 : poser les enfants
  sortedGens.forEach(gen=>{
    const y=genY(gen);
    const fams=famsByGen[gen]||[], lone=lonelyByGen[gen]||[];
    const gw=genTW(gen);
    let curX=(totalW-gw)/2;
    fams.forEach((fam,fi)=>{
      const n=fam.children.length;
      fam.children.forEach((id,i)=>{ pos[id]={x:curX+(n===1?0:i*MIN_SP),y}; });
      curX+=famW(fam)+(fi<fams.length-1?FAM_GAP:0);
    });
    if(lone.length){
      if(fams.length)curX+=FAM_GAP;
      lone.forEach((id,i)=>{ pos[id]={x:curX+i*MIN_SP,y}; });
    }
  });

  // Phase 2 : centrer parents sur leurs enfants
  [...sortedGens].reverse().forEach(gen=>{
    (famsByGen[gen]||[]).forEach(fam=>{
      const xs=fam.children.map(id=>pos[id]?.x).filter(x=>x!==undefined);
      if(!xs.length)return;
      const cx=(Math.min(...xs)+Math.max(...xs))/2;
      const parts=fam.key.split('|'), isSolo=parts[1]==='solo';
      const pA=parts[0], pB=isSolo?null:parts[1];
      const py=genY(nodes.get(pA)?.person?.generation||(gen-1));
      if(pB&&nodes.has(pB)){
        pos[pA]={x:cx-MIN_SP*0.3,y:py};
        pos[pB]={x:cx+MIN_SP*0.3,y:py};
      } else {
        pos[pA]={x:cx,y:py};
      }
    });
  });

  // Phase 3 : anti-collision
  sortedGens.forEach(gen=>{
    const inGen=visIds.filter(id=>(nodes.get(id)?.person?.generation||1)===gen&&pos[id])
      .sort((a,b)=>pos[a].x-pos[b].x);
    for(let i=1;i<inGen.length;i++){
      const prev=pos[inGen[i-1]], cur=pos[inGen[i]];
      if(cur.x-prev.x<MIN_SP*0.72) cur.x=prev.x+MIN_SP*0.72;
    }
  });

  // Nœuds union ● : placés au milieu du couple
  const unionNodes={}; // coupleKey → {x,y}
  Object.entries(coupleChildren).forEach(([key,children])=>{
    const parts=key.split('|'), isSolo=parts[1]==='solo';
    const pA=pos[parts[0]], pB=isSolo?null:pos[parts[1]];
    if(!pA)return;
    const ux=pB?(pA.x+pB.x)/2:pA.x;
    const uy=pA.y;
    unionNodes[key]={x:ux,y:uy};
  });

  return {pos, unionNodes, coupleChildren, totalW, genMin, sortedGens, genY};
}

/* ══════════════════════════════════════
   RENDU SVG
══════════════════════════════════════ */
function renderTree(fid){
  focusId=fid;
  localStorage.setItem('memoires-focus',fid);
  if(svgSel) svgSel.selectAll('*').remove();

  const cont=$('graph-container');
  const W=cont.clientWidth, H=cont.clientHeight;

  const scene   = buildScene(fid);
  const layout  = computeLayout(scene);
  const {pos, unionNodes, coupleChildren, totalW} = layout;
  const {nodes, spouseOf, pMap} = scene;
  const visIds  = [...nodes.keys()];

  const allX=Object.values(pos).map(p=>p.x);
  const allY=Object.values(pos).map(p=>p.y);
  const SVG_W=Math.max(W,Math.max(...allX)+120);
  const SVG_H=Math.max(H,Math.max(...allY)+R+50+60);

  svgSel=d3.select('#graph').attr('width',W).attr('height',H);
  const defs=svgSel.append('defs');

  visIds.forEach(id=>{
    const p=pMap[id]; if(!p)return;
    defs.append('clipPath').attr('id','clip-'+id).append('circle').attr('r',R);
    if(p.mainPhoto){
      const pat=defs.append('pattern').attr('id','img-'+id)
        .attr('patternContentUnits','objectBoundingBox').attr('width',1).attr('height',1);
      pat.append('image').attr('href',p.mainPhoto).attr('width',1).attr('height',1)
        .attr('preserveAspectRatio','xMidYMid slice');
    }
  });

  const focusPt=pos[fid];
  const initK=Math.min(1,(W-60)/SVG_W);
  const initTx=focusPt?W/2-focusPt.x*initK:Math.max(0,(W-SVG_W*initK)/2);
  const initTy=focusPt?H/2-focusPt.y*initK:16;
  const startT=d3.zoomIdentity.translate(initTx,initTy).scale(initK);

  zoomGroup=svgSel.append('g');
  const lineG=zoomGroup.append('g');
  const nodeG=zoomGroup.append('g');

  /* ── TRAITS ── */
  Object.entries(coupleChildren).forEach(([key,childIds])=>{
    const parts=key.split('|'), isSolo=parts[1]==='solo';
    const pA=pos[parts[0]], pB=isSolo?null:pos[parts[1]];
    const un=unionNodes[key];
    if(!pA||!un)return;

    const dim=nodes.get(parts[0])?.dim;
    const op=dim?0.2:0.5;

    // Trait union : de chaque parent vers le nœud ●
    if(pB){
      lineG.append('line')
        .attr('x1',pA.x+(pA.x<pB.x?R:-R)).attr('y1',pA.y)
        .attr('x2',un.x).attr('y2',un.y)
        .attr('stroke',STROKE.married).attr('stroke-width',1.6).attr('stroke-opacity',op);
      lineG.append('line')
        .attr('x1',pB.x+(pB.x<pA.x?R:-R)).attr('y1',pB.y)
        .attr('x2',un.x).attr('y2',un.y)
        .attr('stroke',STROKE.married).attr('stroke-width',1.6).attr('stroke-opacity',op);
    }

    const childPos=childIds.map(id=>pos[id]).filter(Boolean);
    if(!childPos.length)return;

    const cMinX=Math.min(...childPos.map(p=>p.x));
    const cMaxX=Math.max(...childPos.map(p=>p.x));
    const childY=childPos[0].y;
    const cx=(cMinX+cMaxX)/2;
    const startY=un.y+R+18;
    const midY=startY+(childY-R-startY)*0.5;

    // Vertical depuis nœud union vers midY
    lineG.append('line')
      .attr('x1',un.x).attr('y1',un.y+UR)
      .attr('x2',un.x).attr('y2',midY)
      .attr('stroke',STROKE.parent).attr('stroke-width',1.6).attr('stroke-opacity',op);

    // Horizontal vers le centre des enfants
    if(Math.abs(un.x-cx)>3)
      lineG.append('line')
        .attr('x1',un.x).attr('y1',midY)
        .attr('x2',cx).attr('y2',midY)
        .attr('stroke',STROKE.parent).attr('stroke-width',1.6).attr('stroke-opacity',op);

    // Barre horizontale sous les enfants
    if(childIds.length>1)
      lineG.append('line')
        .attr('x1',cMinX).attr('y1',midY)
        .attr('x2',cMaxX).attr('y2',midY)
        .attr('stroke',STROKE.parent).attr('stroke-width',1.6).attr('stroke-opacity',op);

    // Verticals vers chaque enfant
    childPos.forEach(cp=>{
      lineG.append('line')
        .attr('x1',cp.x).attr('y1',midY)
        .attr('x2',cp.x).attr('y2',cp.y-R)
        .attr('stroke',STROKE.parent).attr('stroke-width',1.6).attr('stroke-opacity',op);
    });
  });

  // Fratrie : trait pointillé sous les nœuds (uniquement entre FULL)
  const drawnF=new Set();
  Object.entries(coupleChildren).forEach(([,sibs])=>{
    if(sibs.length<2)return;
    const fullSibs=sibs.filter(id=>!nodes.get(id)?.dim);
    if(fullSibs.length<2)return;
    const key=fullSibs.slice().sort().join(',');
    if(drawnF.has(key))return; drawnF.add(key);
    const positions=fullSibs.map(id=>pos[id]).filter(Boolean);
    if(positions.length<2)return;
    const minX=Math.min(...positions.map(p=>p.x));
    const maxX=Math.max(...positions.map(p=>p.x));
    const fratY=positions[0].y+R+22;
    lineG.append('line')
      .attr('x1',minX).attr('y1',fratY).attr('x2',maxX).attr('y2',fratY)
      .attr('stroke',STROKE.sibling).attr('stroke-width',1.2)
      .attr('stroke-opacity',.7).attr('stroke-dasharray','5,4');
  });

  /* ── NŒUDS UNION ● ── */
  Object.entries(unionNodes).forEach(([key,un])=>{
    const dim=nodes.get(key.split('|')[0])?.dim;
    nodeG.append('circle')
      .attr('cx',un.x).attr('cy',un.y).attr('r',UR)
      .attr('fill','#2b2b28')
      .attr('opacity',dim?0.2:0.7);
  });

  /* ── NŒUDS PERSONNES ── */
  visIds.forEach(id=>{
    const nd=nodes.get(id); if(!nd)return;
    const pt=pos[id]; if(!pt)return;
    const {person:p, dim, hasDimChildren}=nd;
    const isFocus=id===fid;

    const g=nodeG.append('g')
      .attr('transform',`translate(${pt.x},${pt.y})`)
      .attr('id','node-'+id)
      .attr('opacity',dim?0.3:1)
      .style('cursor','pointer');

    // Anneau focus
    if(isFocus)
      g.append('circle').attr('r',R+7).attr('fill','none')
        .attr('stroke','#111110').attr('stroke-width',2).attr('opacity',.15);

    // Cercle principal
    g.append('circle').attr('class','ring').attr('r',R+5).attr('fill','none')
      .attr('stroke','#111110').attr('stroke-width',0).attr('opacity',0);
    g.append('circle').attr('r',R)
      .attr('fill',p.mainPhoto?`url(#img-${id})`:'#f0efed')
      .attr('stroke',isFocus?'#111110':'rgba(255,255,255,0.85)')
      .attr('stroke-width',isFocus?2.5:2)
      .style('filter','drop-shadow(3px 3px 6px rgba(0,0,0,0.09)) drop-shadow(-2px -2px 4px rgba(255,255,255,0.70))');

    if(!p.mainPhoto){
      const pts=p.name.split(' ');
      g.append('text').attr('text-anchor','middle').attr('dominant-baseline','central')
        .attr('font-size','11px').attr('font-weight',isFocus?'700':'600')
        .attr('fill',isFocus?'#111110':'#47463f').attr('pointer-events','none')
        .text(pts.map(w=>w[0]).slice(0,2).join('').toUpperCase());
    }

    // Label nom
    g.append('text').attr('class','lbl').attr('data-id',id)
      .attr('y',R+14).attr('text-anchor','middle')
      .attr('font-family','-apple-system,Helvetica Neue,sans-serif')
      .attr('font-size','11px').attr('font-weight',isFocus?'700':'500')
      .attr('fill',isFocus?'#111110':'#47463f').attr('pointer-events','none');

    // "..." si la personne a des descendants cachés
    if(hasDimChildren && dim){
      const dotG=nodeG.append('g')
        .attr('transform',`translate(${pt.x},${pt.y+R+36})`)
        .style('cursor','pointer')
        .on('click',e=>{e.stopPropagation();renderTree(id);});
      dotG.append('rect').attr('x',-18).attr('y',-11).attr('width',36).attr('height',22)
        .attr('rx',11).attr('fill','#e8e7e4').attr('stroke','#d0ceca').attr('stroke-width',1);
      dotG.append('text').attr('text-anchor','middle').attr('dominant-baseline','central')
        .attr('font-size','14px').attr('fill','#8a8880').attr('letter-spacing','2px')
        .attr('pointer-events','none').text('•••');
    }

    // Interactions
    g.on('mouseenter',function(){
        if(!dim) d3.select(this).select('.ring').attr('stroke-width',2.5).attr('opacity',.22);
      })
      .on('mouseleave',function(){
        d3.select(this).select('.ring').attr('stroke-width',0).attr('opacity',0);
      })
      .on('click',e=>{
        e.stopPropagation();
        if(id===focusId){
          openPanel(id);
        } else {
          closePanel();
          renderTree(id);
        }
      });
  });

  /* ── ZOOM ── */
  zoomBeh=d3.zoom().scaleExtent([0.06,3]).on('zoom',e=>{
    zoomGroup.attr('transform',e.transform);
    const sc=e.transform.k*initK;
    d3.selectAll('.lbl').each(function(){
      const id=d3.select(this).attr('data-id');
      const p=pMap[id]; if(!p)return;
      const parts=p.name.split(' ');
      if(sc>0.85) d3.select(this).text(p.name);
      else if(sc>0.52) d3.select(this).text(parts[0]+(parts[1]?' '+parts[1][0]+'.':''));
      else if(sc>0.30) d3.select(this).text(parts[0]);
      else d3.select(this).text(parts.map(w=>w[0]).slice(0,2).join('').toUpperCase());
    });
  });
  svgSel.call(zoomBeh).on('dblclick.zoom',null);
  svgSel.call(zoomBeh.transform,startT);
  svgSel.on('click',closePanel);

  // Initialiser les labels
  d3.selectAll('.lbl').each(function(){
    const id=d3.select(this).attr('data-id');
    const p=pMap[id]; if(!p)return;
    const sc=initK;
    const parts=p.name.split(' ');
    if(sc>0.85) d3.select(this).text(p.name);
    else if(sc>0.52) d3.select(this).text(parts[0]+(parts[1]?' '+parts[1][0]+'.':''));
    else d3.select(this).text(parts[0]);
  });

  $('btn-in').onclick    =()=>svgSel.transition().duration(280).call(zoomBeh.scaleBy,1.5);
  $('btn-out').onclick   =()=>svgSel.transition().duration(280).call(zoomBeh.scaleBy,0.67);
  $('btn-reset').onclick =()=>svgSel.transition().duration(450).call(zoomBeh.transform,startT);
  window.addEventListener('resize',()=>svgSel.attr('width',cont.clientWidth).attr('height',cont.clientHeight));
}

/* ══════════════════════════════════════
   PANEL
══════════════════════════════════════ */
function calcAge(birth,death){
  if(!birth)return null;
  const m=String(birth).match(/\d{4}/);if(!m)return null;
  const by=parseInt(m[0]);
  const dm=death?String(death).match(/\d{4}/):null;
  return(dm?parseInt(dm[0]):new Date().getFullYear())-by;
}
function fratrieLabel(rank,total){
  if(total<=1)return null;
  if(rank===1)return'Aîné(e)';if(rank===total)return'Benjamin(e)';return'Cadet(te)';
}
function personSVG(filled){
  const c=filled?'#111110':'none',s=filled?'none':'#c0beb6',w=filled?0:1.5;
  return`<svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="6.5" r="3.5" fill="${c}" stroke="${s}" stroke-width="${w}"/><path d="M3 17.5C3 14.186 6.134 11.5 10 11.5s7 2.686 7 6" stroke="${filled?'#111110':s}" stroke-width="${filled?1.5:w}" stroke-linecap="round" fill="${c}"/></svg>`;
}

function openPanel(id){
  const p=allPersons.find(x=>x.id===id);if(!p)return;
  const parts=p.name.split(' ');
  const photo=p.mainPhoto
    ?`<div class="panel-photo-wrap"><img src="${p.mainPhoto}" alt="${p.name}" loading="lazy"/></div>`
    :`<div class="panel-photo-empty"><div class="panel-photo-avatar">${parts.map(w=>w[0]).slice(0,2).join('').toUpperCase()}</div></div>`;
  const age=calcAge(p.birth,p.death);
  const ageHTML=age?`<span class="pill-age">${age} ans</span>`:'';
  const dp=[p.birth?`✦ ${p.birth}`:'',p.death?`† ${p.death}`:''].filter(Boolean);
  const datesHTML=dp.length?`<span class="pill-dates">${dp.join(' · ')}</span>`:'';
  let fratrieHTML='';
  if(p.birthOrder){
    const sc=allLinks.filter(l=>{const s=l.source?.id||l.source,t=l.target?.id||l.target;return l.type==='sibling'&&(s===id||t===id);}).length;
    const tot=sc+1,lbl=fratrieLabel(p.birthOrder,tot);
    if(lbl){
      let pics='';for(let i=1;i<=tot;i++)pics+=personSVG(i===p.birthOrder);
      const ord=p.birthOrder===1?'1ᵉʳ':`${p.birthOrder}ᵉ`;
      fratrieHTML=`<div class="panel-fratrie"><div class="panel-fratrie-pictos">${pics}</div><div><span class="panel-fratrie-label">${lbl}</span><span class="panel-fratrie-sub">${ord} enfant sur ${tot}</span></div></div>`;
    }
  }
  const infoRows=[];
  if(p.birthPlace)infoRows.push(`<div class="panel-info-row"><span class="panel-info-label">Lieu de naissance</span><span class="panel-info-value">${p.birthPlace}</span></div>`);
  const infoHTML=infoRows.length?`<div class="panel-info-bloc">${infoRows.join('')}</div><hr class="panel-div"/>`:'';
  let galleryHTML='';
  if(p.photos&&p.photos.length>1){
    const ex=p.photos.filter(u=>u!==p.mainPhoto);
    if(ex.length)galleryHTML=`<hr class="panel-div"/><div class="panel-gallery-bloc"><div class="panel-gallery-label">Photos</div><div class="panel-gallery">${ex.map(u=>`<img src="${u}" alt="" loading="lazy"/>`).join('')}</div></div>`;
  }
  $('panel-content').innerHTML=`
    ${photo}
    <div class="panel-identity">
      <div class="panel-firstname">${parts[0]}</div>
      <div class="panel-lastname">${parts.slice(1).join(' ')||parts[0]}</div>
      ${p.nomJeuneFille?`<div class="panel-maiden">née ${p.nomJeuneFille}</div>`:''}
      <div class="panel-pills">${ageHTML}${datesHTML}</div>
      ${fratrieHTML}
    </div>
    <hr class="panel-div"/>
    ${infoHTML}
    <div class="panel-bio-bloc">
      <div class="panel-bio-label">Biographie</div>
      <p class="panel-bio">${p.bio||'<span style="opacity:.4;font-style:italic">Aucune biographie.</span>'}</p>
    </div>
    ${galleryHTML}
    <div class="panel-edit-wrap"><a href="saisie.html?edit=${id}" class="btn-edit">✎ Modifier cette fiche</a></div>
  `;
  $('panel').classList.add('panel-open');
  $('panel').classList.remove('panel-closed');
  $('overlay').classList.add('visible');
}

function closePanel(){
  $('panel').className='panel-closed';
  $('overlay').classList.remove('visible');
}

function buildSearch(){
  const inp=$('search'),res=$('search-results');
  inp.addEventListener('input',()=>{
    const q=inp.value.trim().toLowerCase();res.innerHTML='';
    if(!q){res.className='';return;}
    const m=allPersons.filter(p=>p.name.toLowerCase().includes(q)).slice(0,8);
    if(!m.length){res.className='';return;}
    m.forEach(p=>{
      const li=document.createElement('li');li.textContent=p.name;
      li.onclick=()=>{res.className='';inp.value='';renderTree(p.id);};
      res.appendChild(li);
    });
    res.className='visible';
  });
  document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))res.className='';});
}

$('panel-close').onclick=e=>{e.stopPropagation();closePanel();};
$('overlay').onclick=closePanel;
loadData();
</script>

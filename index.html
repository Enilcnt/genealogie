<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mémoires — Arbre Généalogique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="app">
  <header id="header">
    <div class="header-inner">
      <a class="site-brand" href="index.html">
        <span class="site-title">MÉMOIRES</span>
        <span class="site-sub">Arbre Généalogique</span>
      </a>
      <nav class="header-nav">
        <a href="index.html" class="nav-link active">Arbre</a>
        <a href="saisie.html" class="nav-link nav-add">+ Ajouter</a>
      </nav>
      <div class="search-wrap">
        <input id="search" type="text" placeholder="Rechercher…" autocomplete="off"/>
        <ul id="search-results"></ul>
      </div>
      <div class="legend">
        <span class="leg"><span class="leg-line married"></span>Union</span>
        <span class="leg"><span class="leg-line parent"></span>Filiation</span>
        <span class="leg"><span class="leg-line sibling"></span>Fratrie</span>
      </div>
    </div>
  </header>

  <div id="graph-container">
    <svg id="graph"></svg>
    <div id="zoom-btns">
      <button id="btn-in">+</button>
      <button id="btn-reset">⌖</button>
      <button id="btn-out">−</button>
    </div>
    <div id="loading-overlay">
      <div class="spinner"></div>
      <p>Chargement de l'arbre…</p>
    </div>
    <div id="empty-state" style="display:none">
      <p>L'arbre est vide pour l'instant.</p>
      <a href="saisie.html" class="btn-primary" style="margin-top:16px">Ajouter la première personne →</a>
    </div>
  </div>

  <aside id="panel" class="panel-closed">
    <button id="panel-close">✕</button>
    <div id="panel-content"></div>
  </aside>
  <div id="overlay"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script type="module">
  import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, orderBy }
                            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { FIREBASE_CONFIG } from './firebase-config.js';

  const app = initializeApp(FIREBASE_CONFIG);
  const db  = getFirestore(app);
  const $   = id => document.getElementById(id);

  const LINK_COLOR = {married:'#c9a84c', parent:'#6ab4d8', sibling:'#9b8ec4'};
  const REL = {
    married:{f:'Conjoint(e)', b:'Conjoint(e)'},
    parent: {f:'Enfant',      b:'Parent'},
    sibling:{f:'Frère/Sœur',  b:'Frère/Sœur'},
  };

  let allPersons=[], allLinks=[], simulation, svgRoot, zoomGroup, zoomBeh, selectedId=null;

  async function loadData() {
    const [pSnap,lSnap] = await Promise.all([
      getDocs(query(collection(db,'persons'), orderBy('name'))),
      getDocs(collection(db,'links'))
    ]);
    allPersons = pSnap.docs.map(d=>({id:d.id,...d.data()}));
    allLinks   = lSnap.docs.map(d=>({id:d.id,...d.data()}));
    $('loading-overlay').style.display='none';
    if (!allPersons.length) { $('empty-state').style.display='flex'; return; }
    buildGraph(); buildSearch();
  }

  function buildGraph() {
    const cont=$('graph-container');
    const W=cont.clientWidth, H=cont.clientHeight;
    svgRoot = d3.select('#graph').attr('width',W).attr('height',H);

    const defs=svgRoot.append('defs');
    const filt=defs.append('filter').attr('id','glow').attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
    filt.append('feGaussianBlur').attr('stdDeviation','4').attr('result','blur');
    const fm=filt.append('feMerge');
    fm.append('feMergeNode').attr('in','blur');
    fm.append('feMergeNode').attr('in','SourceGraphic');

    allPersons.forEach(p=>{
      defs.append('clipPath').attr('id',`clip-${p.id}`)
        .append('circle').attr('r',30);
    });

    zoomGroup = svgRoot.append('g');
    const nodes = allPersons.map(p=>({...p}));
    const nMap  = {}; nodes.forEach(n=>nMap[n.id]=n);
    const links = allLinks.map(l=>({...l, source:nMap[l.source]||l.source, target:nMap[l.target]||l.target}));

    const gMax = d3.max(nodes,n=>n.generation||1)||1;
    simulation = d3.forceSimulation(nodes)
      .force('link',    d3.forceLink(links).id(d=>d.id).distance(d=>d.type==='married'?88:148))
      .force('charge',  d3.forceManyBody().strength(-300))
      .force('center',  d3.forceCenter(W/2,H/2))
      .force('collide', d3.forceCollide(58))
      .force('gen-y',   d3.forceY(n=>H*0.12+((n.generation||1)-1)/gMax*H*0.76).strength(0.18));

    const linkSel = zoomGroup.append('g').selectAll('line').data(links).enter().append('line')
      .attr('stroke', d=>LINK_COLOR[d.type]||'#666')
      .attr('stroke-width', d=>d.type==='married'?2:1.5)
      .attr('stroke-opacity',.5)
      .attr('stroke-dasharray', d=>d.type==='sibling'?'5,3':null);

    const nodeSel = zoomGroup.append('g').selectAll('g').data(nodes).enter().append('g')
      .style('cursor','pointer')
      .call(d3.drag().on('start',ds).on('drag',dd).on('end',de))
      .on('click',(e,d)=>{e.stopPropagation();openPanel(d.id);});

    nodeSel.append('circle').attr('r',36).attr('fill','none')
      .attr('stroke','#c9a84c').attr('stroke-width',0).attr('opacity',0).attr('class','glow-r');
    nodeSel.append('circle').attr('class','node-bg').attr('r',30)
      .attr('fill','#161924')
      .attr('stroke',d=>d.death?'rgba(140,120,80,.5)':'rgba(201,168,76,.6)')
      .attr('stroke-width',2);

    nodeSel.each(function(d){
      const g=d3.select(this);
      if (d.mainPhoto) {
        g.append('image').attr('href',d.mainPhoto)
          .attr('x',-30).attr('y',-30).attr('width',60).attr('height',60)
          .attr('clip-path',`url(#clip-${d.id})`)
          .attr('preserveAspectRatio','xMidYMid slice');
      } else {
        const ini=d.name.split(' ').map(w=>w[0]).slice(0,2).join('');
        g.append('circle').attr('r',30).attr('fill','#1e2230');
        g.append('text').attr('text-anchor','middle').attr('dy','0.35em')
          .attr('font-family','Cinzel,serif').attr('font-size','13px')
          .attr('fill','#c9a84c').attr('pointer-events','none').text(ini);
      }
    });

    nodeSel.append('text').attr('y',44).attr('text-anchor','middle')
      .attr('font-family','Cormorant Garamond,serif').attr('font-size','12px')
      .attr('fill','#c8bfa8').attr('pointer-events','none')
      .text(d=>{const p=d.name.split(' ');return p.length<=2?d.name:p[0]+' '+p[p.length-1];});

    nodeSel
      .on('mouseenter',function(_,d){
        d3.select(this).select('.node-bg').attr('stroke','#c9a84c').attr('stroke-width',3);
        d3.select(this).select('.glow-r').transition().duration(200).attr('opacity',.35).attr('stroke-width',2.5);
      })
      .on('mouseleave',function(_,d){
        if(selectedId!==d.id){
          d3.select(this).select('.node-bg').attr('stroke',d.death?'rgba(140,120,80,.5)':'rgba(201,168,76,.6)').attr('stroke-width',2);
          d3.select(this).select('.glow-r').transition().duration(200).attr('opacity',0).attr('stroke-width',0);
        }
      });

    simulation.on('tick',()=>{
      linkSel.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
             .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      nodeSel.attr('transform',d=>`translate(${d.x},${d.y})`);
    });

    zoomBeh = d3.zoom().scaleExtent([.1,3]).on('zoom',e=>zoomGroup.attr('transform',e.transform));
    svgRoot.call(zoomBeh);
    svgRoot.on('click',closePanel);

    window.addEventListener('resize',()=>{
      const W2=cont.clientWidth,H2=cont.clientHeight;
      svgRoot.attr('width',W2).attr('height',H2);
      simulation.force('center',d3.forceCenter(W2/2,H2/2)).alpha(.1).restart();
    });
  }

  function ds(e,d){if(!e.active)simulation.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;}
  function dd(e,d){d.fx=e.x;d.fy=e.y;}
  function de(e,d){if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null;}

  function openPanel(id) {
    const p=allPersons.find(x=>x.id===id); if(!p) return;
    if(selectedId) unhighlight(selectedId);
    selectedId=id; highlight(id);

    const rels=[];
    allLinks.forEach(l=>{
      const sid=l.source?.id||l.source, tid=l.target?.id||l.target;
      if(sid===id){const o=allPersons.find(x=>x.id===tid);if(o)rels.push({person:o,type:l.type,dir:'f'});}
      if(tid===id){const o=allPersons.find(x=>x.id===sid);if(o)rels.push({person:o,type:l.type,dir:'b'});}
    });

    const photo = p.mainPhoto
      ? `<div class="panel-photo-wrap"><img src="${p.mainPhoto}" alt="${p.name}" loading="lazy"/></div>`
      : `<div class="panel-no-photo">👤</div>`;

    const dates=[p.birth?`✦ ${p.birth}`:'',p.death?`† ${p.death}`:''].filter(Boolean).join('  —  ');

    let galleryHTML='';
    if(p.photos && p.photos.length>1){
      const imgs=p.photos.filter(u=>u!==p.mainPhoto).map(u=>`<img src="${u}" alt="" loading="lazy"/>`).join('');
      if(imgs) galleryHTML=`<div class="panel-gallery">${imgs}</div>`;
    }

    const relsHTML=rels.length?`<div class="panel-relatives"><h3>Liens familiaux</h3><ul>${
      rels.map(r=>`<li onclick="window._openPanel('${r.person.id}')">${r.person.name}<span class="rel-type">${(REL[r.type]||{})[r.dir]||r.type}</span></li>`).join('')
    }</ul></div>`:'';

    $('panel-content').innerHTML=`
      ${photo}
      <div class="panel-name">${p.name}</div>
      ${dates?`<div class="panel-dates">${dates}</div>`:''}
      <hr class="panel-div"/>
      <p class="panel-bio">${p.bio||'<span style="opacity:.4">Aucune biographie.</span>'}</p>
      ${galleryHTML}
      ${relsHTML}
      <div class="panel-edit-wrap"><a href="saisie.html?edit=${id}" class="btn-edit">✎ Modifier cette fiche</a></div>
    `;

    window._openPanel=openPanel;
    $('panel').classList.add('panel-open'); $('panel').classList.remove('panel-closed');
    $('overlay').classList.add('visible');
    svgRoot.transition().duration(500).call(zoomBeh.translateTo,p.x+(window.innerWidth>640?215:0),p.y);
  }

  function closePanel(){
    $('panel').className='panel-closed';
    $('overlay').classList.remove('visible');
    if(selectedId){unhighlight(selectedId);selectedId=null;}
  }
  function highlight(id){
    d3.selectAll('g').filter(d=>d&&d.id===id).select('.node-bg').attr('stroke','#c9a84c').attr('stroke-width',3);
    d3.selectAll('g').filter(d=>d&&d.id===id).select('.glow-r').attr('opacity',.4).attr('stroke-width',3);
  }
  function unhighlight(id){
    const p=allPersons.find(x=>x.id===id);
    d3.selectAll('g').filter(d=>d&&d.id===id).select('.node-bg')
      .attr('stroke',p?.death?'rgba(140,120,80,.5)':'rgba(201,168,76,.6)').attr('stroke-width',2);
    d3.selectAll('g').filter(d=>d&&d.id===id).select('.glow-r').attr('opacity',0).attr('stroke-width',0);
  }

  function buildSearch(){
    const inp=$('search'),res=$('search-results');
    inp.addEventListener('input',()=>{
      const q=inp.value.trim().toLowerCase(); res.innerHTML='';
      if(!q){res.className='';return;}
      const m=allPersons.filter(p=>p.name.toLowerCase().includes(q)).slice(0,8);
      if(!m.length){res.className='';return;}
      m.forEach(p=>{
        const li=document.createElement('li');li.textContent=p.name;
        li.onclick=()=>{openPanel(p.id);inp.value='';res.className='';};
        res.appendChild(li);
      });
      res.className='visible';
    });
    document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))res.className='';});
  }

  $('btn-in').onclick    =()=>svgRoot.transition().duration(300).call(zoomBeh.scaleBy,1.4);
  $('btn-out').onclick   =()=>svgRoot.transition().duration(300).call(zoomBeh.scaleBy,.7);
  $('btn-reset').onclick =()=>svgRoot.transition().duration(500).call(zoomBeh.transform,d3.zoomIdentity);
  $('panel-close').onclick=e=>{e.stopPropagation();closePanel();};
  $('overlay').onclick=closePanel;

  loadData();
</script>
</body>
</html>

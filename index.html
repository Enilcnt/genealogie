<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mémoires — Arbre Généalogique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="app">
  <header id="header">
    <div class="header-inner">
      <a class="site-brand" href="index.html">
        <span class="site-title">MÉMOIRES</span>
        <span class="site-sub">Arbre généalogique</span>
      </a>
      <nav class="header-nav">
        <a href="index.html"  class="nav-link active">Arbre</a>
        <a href="saisie.html" class="nav-add">+ Ajouter</a>
      </nav>
      <div class="search-wrap">
        <input id="search" type="text" placeholder="Rechercher…" autocomplete="off"/>
        <ul id="search-results"></ul>
      </div>
      <div class="legend">
        <span class="leg"><span class="leg-line parent"></span>Filiation</span>
        <span class="leg"><span class="leg-line married"></span>Union</span>
        <span class="leg"><span class="leg-line sibling"></span>Fratrie</span>
      </div>
    </div>
  </header>

  <div id="graph-container">
    <svg id="graph"></svg>
    <div id="zoom-btns">
      <button id="btn-in">+</button>
      <button id="btn-reset" style="font-size:.65rem">⌖</button>
      <button id="btn-out">−</button>
    </div>
    <div id="loading-overlay">
      <div class="spinner"></div>
      <p>Chargement de l'arbre…</p>
    </div>
    <div id="empty-state">
      <p>L'arbre est vide pour l'instant.</p>
      <a href="saisie.html" class="btn-primary" style="margin-top:12px">Ajouter la première personne →</a>
    </div>
  </div>

  <aside id="panel" class="panel-closed">
    <button id="panel-close">✕</button>
    <div id="panel-content"></div>
  </aside>
  <div id="overlay"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script type="module">
  import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, orderBy }
                            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { FIREBASE_CONFIG } from './firebase-config.js';

  const app = initializeApp(FIREBASE_CONFIG);
  const db  = getFirestore(app);
  const $   = id => document.getElementById(id);

  /* ══════════════════════════════════════════
     CONSTANTES DE LAYOUT
  ══════════════════════════════════════════ */
  const R          = 27;   // rayon du cercle
  const LABEL_H    = 18;   // hauteur du label sous le cercle
  const NODE_BOT   = R + LABEL_H + 6; // bas du nœud complet (cercle + label + marge)
  const COL_W      = 100;  // espacement minimum entre deux nœuds frères
  const FAMILY_GAP = 80;   // espace supplémentaire entre deux familles distinctes
  const ROW_H      = 160;  // hauteur entre deux générations
  const PAD_T      = 60;   // padding haut
  const CONJ_GAP   = 85;   // distance conjoint ↔ groupe enfants

  const LINK_STYLE = {
    parent:  { stroke:'#2b2b28', w:1.6, op:.5,  dash:null  },
    married: { stroke:'#8a8880', w:1.4, op:.45, dash:null  },
    sibling: { stroke:'#c0beb6', w:1.2, op:.7,  dash:'5,4' },
  };

  function getLabel(p, scale) {
    const parts = p.name.split(' ');
    if (scale > 0.90) return p.name;
    if (scale > 0.55) return parts[0] + (parts[1] ? ' ' + parts[1][0] + '.' : '');
    if (scale > 0.32) return parts[0];
    return parts.map(w => w[0]).slice(0,2).join('').toUpperCase();
  }

  let allPersons = [], allLinks = [], svgSel, zoomGroup, zoomBeh, selectedId = null;

  async function loadData() {
    const [pSnap, lSnap] = await Promise.all([
      getDocs(query(collection(db,'persons'), orderBy('name'))),
      getDocs(collection(db,'links'))
    ]);
    allPersons = pSnap.docs.map(d => ({id: d.id, ...d.data()}));
    allLinks   = lSnap.docs.map(d => ({id: d.id, ...d.data()}));
    $('loading-overlay').style.display = 'none';
    if (!allPersons.length) { $('empty-state').style.display = 'flex'; return; }
    buildTree();
    buildSearch();
  }

  /* ══════════════════════════════════════════
     CALCUL DES POSITIONS (algorithme récursif)

     Principe :
     - On part des racines (personnes sans parents dans les liens)
     - Pour chaque couple, on calcule la largeur de son sous-arbre
     - On centre chaque couple sur son sous-arbre
     - Les conjoints se placent à l'extérieur du noyau d'enfants
     - Les enfants sont triés par birthOrder puis par birth
  ══════════════════════════════════════════ */
  function buildTree() {
    const cont = $('graph-container');
    const W = cont.clientWidth, H = cont.clientHeight;

    /* ── Relations ── */
    const parentOf    = {}; // personId → [childIds] (par ce parent)
    const parentsOf   = {}; // childId  → [parentIds]
    const spouseOf    = {}; // personId → spouseId
    const childrenByCouple = {}; // "p1,p2" → [childIds]

    allLinks.forEach(l => {
      if (l.type === 'married') {
        spouseOf[l.source] = l.target;
        spouseOf[l.target] = l.source;
      }
      if (l.type === 'parent') {
        (parentOf[l.source]  = parentOf[l.source]  || []).push(l.target);
        (parentsOf[l.target] = parentsOf[l.target] || []).push(l.source);
      }
    });

    /* Grouper les enfants par couple (clé triée pour être symétrique) */
    allPersons.forEach(p => {
      const parents = parentsOf[p.id] || [];
      if (parents.length === 0) return;
      if (parents.length >= 2) {
        const key = parents.slice().sort().join(',');
        (childrenByCouple[key] = childrenByCouple[key] || []).push(p.id);
      } else {
        const key = parents[0] + ',solo';
        (childrenByCouple[key] = childrenByCouple[key] || []).push(p.id);
      }
    });

    /* Trier les enfants de chaque couple par birthOrder puis birth */
    Object.keys(childrenByCouple).forEach(key => {
      childrenByCouple[key].sort((a, b) => {
        const pa = allPersons.find(x => x.id === a);
        const pb = allPersons.find(x => x.id === b);
        const oa = pa?.birthOrder ?? 999;
        const ob = pb?.birthOrder ?? 999;
        if (oa !== ob) return oa - ob;
        return (pa?.birth || '').localeCompare(pb?.birth || '');
      });
    });

    /* ── Calcul récursif de la largeur de sous-arbre ──
       Retourne la largeur totale occupée par le sous-arbre d'un couple
    */
    const subtreeWidth = {}; // coupleKey → width

    function getCoupleKey(personId) {
      const sp = spouseOf[personId];
      if (sp) return [personId, sp].sort().join(',');
      const hasChildren = Object.keys(childrenByCouple).find(k => k === personId + ',solo');
      if (hasChildren) return personId + ',solo';
      return null;
    }

    function computeWidth(coupleKey) {
      if (subtreeWidth[coupleKey] !== undefined) return subtreeWidth[coupleKey];
      const children = childrenByCouple[coupleKey] || [];
      if (children.length === 0) {
        subtreeWidth[coupleKey] = COL_W;
        return COL_W;
      }
      // Largeur = somme des sous-arbres des enfants + gaps entre eux
      let total = 0;
      children.forEach((childId, i) => {
        const ck = getCoupleKey(childId);
        const w = ck ? computeWidth(ck) : COL_W;
        total += w;
        if (i < children.length - 1) total += FAMILY_GAP * 0.3;
      });
      subtreeWidth[coupleKey] = Math.max(total, COL_W);
      return subtreeWidth[coupleKey];
    }

    /* Calculer toutes les largeurs */
    Object.keys(childrenByCouple).forEach(k => computeWidth(k));

    /* ── Assignation des positions X/Y ── */
    const pos = {}; // personId → {x, y}
    const genY = g => PAD_T + g * ROW_H + R;

    /* Trouver les racines (personnes sans parents) */
    const hasParent = new Set(Object.keys(parentsOf));
    const roots = allPersons.filter(p => !hasParent.has(p.id));

    /* Placer récursivement un couple et ses descendants */
    function placeCouple(coupleKey, centerX, gen) {
      const parts = coupleKey.split(',');
      const isSolo = parts[1] === 'solo';
      const personA = parts[0];
      const personB = isSolo ? null : parts[1];
      const y = genY(gen);

      const children = childrenByCouple[coupleKey] || [];

      if (children.length === 0) {
        // Pas d'enfants : placer juste les personnes
        if (!pos[personA]) pos[personA] = { x: centerX, y };
        if (personB && !pos[personB]) {
          pos[personB] = { x: centerX + CONJ_GAP, y };
        }
        return;
      }

      // Calculer les positions X des enfants
      const childWidths = children.map(id => {
        const ck = getCoupleKey(id);
        return ck ? computeWidth(ck) : COL_W;
      });
      const totalChildW = childWidths.reduce((s, w) => s + w, 0) + (children.length - 1) * FAMILY_GAP * 0.3;

      // Centre des enfants = centerX
      let childX = centerX - totalChildW / 2;
      children.forEach((childId, i) => {
        const w = childWidths[i];
        const childCenter = childX + w / 2;
        const ck = getCoupleKey(childId);
        if (ck) {
          placeCouple(ck, childCenter, gen + 1);
        } else {
          pos[childId] = { x: childCenter, y: genY(gen + 1) };
        }
        childX += w + FAMILY_GAP * 0.3;
      });

      // Placer le couple au-dessus du centre de ses enfants
      const childPositions = children.map(id => pos[id]).filter(Boolean);
      const minCX = Math.min(...childPositions.map(p => p.x));
      const maxCX = Math.max(...childPositions.map(p => p.x));
      const coupleCenter = (minCX + maxCX) / 2;

      if (!pos[personA]) {
        if (personB && !pos[personB]) {
          // Couple : A à gauche, B à droite du centre
          pos[personA] = { x: coupleCenter - CONJ_GAP / 2, y };
          pos[personB] = { x: coupleCenter + CONJ_GAP / 2, y };
        } else {
          pos[personA] = { x: coupleCenter, y };
        }
      }
    }

    /* Placer toutes les familles racines */
    // Regrouper les racines en couples
    const placedPersons = new Set();
    const rootCouples = [];

    roots.forEach(p => {
      if (placedPersons.has(p.id)) return;
      placedPersons.add(p.id);
      const sp = spouseOf[p.id];
      if (sp && !placedPersons.has(sp)) {
        placedPersons.add(sp);
        const key = [p.id, sp].sort().join(',');
        rootCouples.push(key);
      } else if (!sp) {
        // Vérifier si parent solo
        const soloKey = p.id + ',solo';
        if (childrenByCouple[soloKey]) rootCouples.push(soloKey);
        else rootCouples.push(p.id + ',solo'); // personne isolée
      }
    });

    // Calculer largeur totale des familles racines
    const rootWidths = rootCouples.map(k => {
      computeWidth(k);
      return subtreeWidth[k] || COL_W;
    });
    const totalRootW = rootWidths.reduce((s, w) => s + w, 0) + (rootCouples.length - 1) * FAMILY_GAP;
    const startX = Math.max(W / 2 - totalRootW / 2, 80);

    let curX = startX;
    rootCouples.forEach((key, i) => {
      const w = rootWidths[i];
      placeCouple(key, curX + w / 2, 0);
      curX += w + FAMILY_GAP;
    });

    /* Placer les personnes sans position (non reliées) */
    let floatX = 80;
    allPersons.forEach(p => {
      if (!pos[p.id]) {
        pos[p.id] = { x: floatX, y: genY(0) };
        floatX += COL_W + 40;
      }
    });

    /* ── Dimensions SVG ── */
    const allX = Object.values(pos).map(p => p.x);
    const allY = Object.values(pos).map(p => p.y);
    const TOTAL_W = Math.max(W, Math.max(...allX) + 120);
    const TOTAL_H = Math.max(H, Math.max(...allY) + NODE_BOT + 60);

    /* ── SVG setup ── */
    svgSel = d3.select('#graph').attr('width', W).attr('height', H);
    const defs = svgSel.append('defs');

    allPersons.forEach(p => {
      defs.append('clipPath').attr('id','clip-'+p.id).append('circle').attr('r', R);
      if (p.mainPhoto) {
        const pat = defs.append('pattern').attr('id','img-'+p.id)
          .attr('patternContentUnits','objectBoundingBox').attr('width',1).attr('height',1);
        pat.append('image').attr('href', p.mainPhoto)
          .attr('width',1).attr('height',1).attr('preserveAspectRatio','xMidYMid slice');
      }
    });

    const initK  = Math.min(1, (W - 60) / TOTAL_W);
    const initTx = Math.max(0, (W - TOTAL_W * initK) / 2);
    const startT = d3.zoomIdentity.translate(initTx, 16).scale(initK);

    zoomGroup = svgSel.append('g');
    const lineG = zoomGroup.append('g');
    const nodeG = zoomGroup.append('g');

    /* ══════════════════════════════════════════
       TRACÉ DES LIENS
    ══════════════════════════════════════════ */

    /* UNIONS — trait horizontal entre conjoints */
    const drawnUnions = new Set();
    allLinks.forEach(l => {
      if (l.type !== 'married') return;
      const key = [l.source, l.target].sort().join(',');
      if (drawnUnions.has(key)) return;
      drawnUnions.add(key);
      const pa = pos[l.source], pb = pos[l.target];
      if (!pa || !pb) return;
      const s = LINK_STYLE.married;
      lineG.append('line')
        .attr('x1', Math.min(pa.x,pb.x) + R).attr('y1', (pa.y+pb.y)/2)
        .attr('x2', Math.max(pa.x,pb.x) - R).attr('y2', (pa.y+pb.y)/2)
        .attr('stroke',s.stroke).attr('stroke-width',s.w).attr('stroke-opacity',s.op);
    });

    /* FILIATIONS — orthogonales, partent du bas du label */
    Object.entries(childrenByCouple).forEach(([coupleKey, childIds]) => {
      const parts  = coupleKey.split(',');
      const isSolo = parts[1] === 'solo';
      const pA = pos[parts[0]];
      const pB = isSolo ? null : pos[parts[1]];
      if (!pA) return;

      const childPositions = childIds.map(id => pos[id]).filter(Boolean);
      if (!childPositions.length) return;

      const srcX = pB ? (pA.x + pB.x) / 2 : pA.x;
      const srcY = pA.y; // centre du nœud parent

      const childMinX = Math.min(...childPositions.map(p => p.x));
      const childMaxX = Math.max(...childPositions.map(p => p.x));
      const childY    = childPositions[0].y;
      const centerX   = (childMinX + childMaxX) / 2;

      /* Point de départ : bas du label du parent (pas bas du cercle) */
      const startY = srcY + NODE_BOT;
      /* Point d'arrivée : haut du cercle de l'enfant */
      const arriveY = childY - R;
      /* Nœud intermédiaire horizontal */
      const midY = startY + (arriveY - startY) * 0.45;

      const s = LINK_STYLE.parent;

      /* Vertical depuis parent → midY */
      lineG.append('line')
        .attr('x1', srcX).attr('y1', startY)
        .attr('x2', srcX).attr('y2', midY)
        .attr('stroke',s.stroke).attr('stroke-width',s.w).attr('stroke-opacity',s.op);

      /* Horizontal vers le centre des enfants (si décalé) */
      if (Math.abs(srcX - centerX) > 2) {
        lineG.append('line')
          .attr('x1', srcX).attr('y1', midY)
          .attr('x2', centerX).attr('y2', midY)
          .attr('stroke',s.stroke).attr('stroke-width',s.w).attr('stroke-opacity',s.op);
      }

      /* Barre horizontale couvrant tous les enfants */
      if (childIds.length > 1) {
        lineG.append('line')
          .attr('x1', childMinX).attr('y1', midY)
          .attr('x2', childMaxX).attr('y2', midY)
          .attr('stroke',s.stroke).attr('stroke-width',s.w).attr('stroke-opacity',s.op);
      }

      /* Verticales vers chaque enfant */
      childPositions.forEach(cp => {
        lineG.append('line')
          .attr('x1', cp.x).attr('y1', midY)
          .attr('x2', cp.x).attr('y2', cp.y - R)
          .attr('stroke',s.stroke).attr('stroke-width',s.w).attr('stroke-opacity',s.op);
      });
    });

    /* FRATRIE — trait pointillé sous les labels */
    const drawnFrat = new Set();
    Object.entries(childrenByCouple).forEach(([, siblings]) => {
      if (siblings.length < 2) return;
      const key = siblings.slice().sort().join(',');
      if (drawnFrat.has(key)) return;
      drawnFrat.add(key);
      const positions = siblings.map(id => pos[id]).filter(Boolean);
      if (positions.length < 2) return;
      const minX  = Math.min(...positions.map(p => p.x));
      const maxX  = Math.max(...positions.map(p => p.x));
      /* Sous les labels : bas du nœud + 8px */
      const fratY = positions[0].y + NODE_BOT + 8;
      const s = LINK_STYLE.sibling;
      lineG.append('line')
        .attr('x1', minX).attr('y1', fratY)
        .attr('x2', maxX).attr('y2', fratY)
        .attr('stroke',s.stroke).attr('stroke-width',s.w).attr('stroke-opacity',s.op)
        .attr('stroke-dasharray',s.dash);
    });

    /* ══════════════════════════════════════════
       NŒUDS
    ══════════════════════════════════════════ */
    allPersons.forEach(p => {
      const pt = pos[p.id]; if (!pt) return;
      const g = nodeG.append('g')
        .attr('transform', `translate(${pt.x},${pt.y})`)
        .attr('id', 'node-'+p.id)
        .style('cursor','pointer');

      g.append('circle').attr('class','ring')
        .attr('r',R+5).attr('fill','none')
        .attr('stroke','#111110').attr('stroke-width',0).attr('opacity',0);

      g.append('circle').attr('r', R)
        .attr('fill', p.mainPhoto ? `url(#img-${p.id})` : '#f0efed')
        .attr('stroke','rgba(255,255,255,0.85)').attr('stroke-width',2)
        .style('filter','drop-shadow(3px 3px 6px rgba(0,0,0,0.09)) drop-shadow(-2px -2px 4px rgba(255,255,255,0.70))');

      if (!p.mainPhoto) {
        const parts = p.name.split(' ');
        const ini = parts.map(w => w[0]).slice(0,2).join('').toUpperCase();
        g.append('text').attr('text-anchor','middle').attr('dominant-baseline','central')
          .attr('font-size','11px').attr('font-weight','600')
          .attr('fill','#47463f').attr('pointer-events','none').text(ini);
      }

      /* Label : y = R + 14 (sous le cercle, avant la zone des traits fratrie) */
      g.append('text').attr('class','lbl').attr('data-id', p.id)
        .attr('y', R + 14).attr('text-anchor','middle')
        .attr('font-family','-apple-system,Helvetica Neue,sans-serif')
        .attr('font-size','11px').attr('font-weight','500')
        .attr('fill','#47463f').attr('pointer-events','none');

      /* Rang fratrie (si défini) */
      if (p.birthOrder) {
        g.append('text')
          .attr('x', R - 2).attr('y', -R + 10)
          .attr('text-anchor','middle').attr('dominant-baseline','central')
          .attr('font-size','8px').attr('font-weight','600')
          .attr('fill','#b4b2aa').attr('pointer-events','none')
          .text(p.birthOrder);
      }

      g.on('mouseenter', function() {
        d3.select(this).select('.ring').attr('stroke-width',2.5).attr('opacity',.22);
      }).on('mouseleave', function() {
        if (selectedId !== p.id)
          d3.select(this).select('.ring').attr('stroke-width',0).attr('opacity',0);
      }).on('click', e => { e.stopPropagation(); openPanel(p.id); });
    });

    /* ══════════════════════════════════════════
       ZOOM
    ══════════════════════════════════════════ */
    zoomBeh = d3.zoom().scaleExtent([0.1, 3]).on('zoom', e => {
      zoomGroup.attr('transform', e.transform);
      updateLabels(e.transform.k * initK);
    });

    svgSel.call(zoomBeh).on('dblclick.zoom', null);
    svgSel.call(zoomBeh.transform, startT);
    svgSel.on('click', closePanel);

    updateLabels(initK);

    $('btn-in').onclick    = () => svgSel.transition().duration(280).call(zoomBeh.scaleBy, 1.5);
    $('btn-out').onclick   = () => svgSel.transition().duration(280).call(zoomBeh.scaleBy, 0.67);
    $('btn-reset').onclick = () => svgSel.transition().duration(450).call(zoomBeh.transform, startT);

    window.addEventListener('resize', () => {
      svgSel.attr('width', cont.clientWidth).attr('height', cont.clientHeight);
    });
  }

  function updateLabels(scale) {
    d3.selectAll('.lbl').each(function() {
      const id = d3.select(this).attr('data-id');
      const p  = allPersons.find(x => x.id === id);
      if (p) d3.select(this).text(getLabel(p, scale));
    });
  }

  /* ══════════════════════════════════════════
     PANEL
  ══════════════════════════════════════════ */
  function openPanel(id) {
    const p = allPersons.find(x => x.id === id); if (!p) return;
    if (selectedId) unhighlight(selectedId);
    selectedId = id; highlight(id);

    const parts     = p.name.split(' ');
    const firstName = parts[0];
    const lastName  = parts.slice(1).join(' ');
    const photo = p.mainPhoto
      ? `<div class="panel-photo-wrap"><img src="${p.mainPhoto}" alt="${p.name}" loading="lazy"/></div>`
      : `<div class="panel-no-photo">👤</div>`;
    const dates = [p.birth ? `✦ ${p.birth}` : '', p.death ? `† ${p.death}` : ''].filter(Boolean).join('  —  ');
    let birthOrderHTML = '';
    if (p.birthOrder) {
      const ordinals = ['','1ᵉʳ','2ᵉ','3ᵉ','4ᵉ','5ᵉ','6ᵉ','7ᵉ','8ᵉ','9ᵉ','10ᵉ'];
      birthOrderHTML = `<div class="panel-birth-order">${ordinals[p.birthOrder] || p.birthOrder+'ᵉ'} enfant</div>`;
    }
    let galleryHTML = '';
    if (p.photos && p.photos.length > 1) {
      const extras = p.photos.filter(u => u !== p.mainPhoto);
      if (extras.length) galleryHTML = `<div class="panel-gallery">${extras.map(u=>`<img src="${u}" alt="" loading="lazy"/>`).join('')}</div>`;
    }

    $('panel-content').innerHTML = `
      ${photo}
      <div class="panel-firstname">${firstName}</div>
      <div class="panel-lastname">${lastName || firstName}</div>
      ${dates ? `<div class="panel-dates">${dates}</div>` : ''}
      ${birthOrderHTML}
      <hr class="panel-div"/>
      <p class="panel-bio">${p.bio || '<span style="opacity:.4;font-style:italic">Aucune biographie.</span>'}</p>
      ${galleryHTML}
      <div class="panel-edit-wrap"><a href="saisie.html?edit=${id}" class="btn-edit">✎ Modifier cette fiche</a></div>
    `;

    $('panel').classList.add('panel-open');
    $('panel').classList.remove('panel-closed');
    $('overlay').classList.add('visible');
  }

  function closePanel() {
    $('panel').className = 'panel-closed';
    $('overlay').classList.remove('visible');
    if (selectedId) { unhighlight(selectedId); selectedId = null; }
  }
  function highlight(id) {
    d3.select('#node-'+id).select('.ring').attr('stroke-width',3).attr('opacity',.3);
  }
  function unhighlight(id) {
    d3.select('#node-'+id).select('.ring').attr('stroke-width',0).attr('opacity',0);
  }

  function buildSearch() {
    const inp = $('search'), res = $('search-results');
    inp.addEventListener('input', () => {
      const q = inp.value.trim().toLowerCase(); res.innerHTML = '';
      if (!q) { res.className = ''; return; }
      const m = allPersons.filter(p => p.name.toLowerCase().includes(q)).slice(0,8);
      if (!m.length) { res.className = ''; return; }
      m.forEach(p => {
        const li = document.createElement('li'); li.textContent = p.name;
        li.onclick = () => { openPanel(p.id); inp.value = ''; res.className = ''; };
        res.appendChild(li);
      });
      res.className = 'visible';
    });
    document.addEventListener('click', e => {
      if (!e.target.closest('.search-wrap')) res.className = '';
    });
  }

  $('panel-close').onclick = e => { e.stopPropagation(); closePanel(); };
  $('overlay').onclick = closePanel;
  loadData();
</script>
</body>
</html>

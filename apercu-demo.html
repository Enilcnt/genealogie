<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mémoires — Aperçu démo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <style>
:root {
  --bg:#080a0f; --bg2:#0e1018; --bg3:#161924; --bg4:#1e2230;
  --border:rgba(180,150,90,0.18); --border2:rgba(180,150,90,0.38);
  --gold:#c9a84c; --gold-dim:rgba(201,168,76,0.35); --gold-glow:rgba(201,168,76,0.10);
  --text:#e8dfc8; --text-dim:#8a8070;
  --blue:#6ab4d8; --purple:#9b8ec4;
  --header-h:68px; --panel-w:430px; --ease:cubic-bezier(0.4,0,0.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'EB Garamond',Georgia,serif;overflow:hidden}
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");opacity:.45}

/* HEADER */
#header{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--header-h);
  background:linear-gradient(to bottom,rgba(8,10,15,.97),rgba(8,10,15,.82));
  border-bottom:1px solid var(--border);backdrop-filter:blur(14px)}
.header-inner{display:flex;align-items:center;gap:28px;height:100%;padding:0 28px}
.site-title{font-family:'Cinzel',serif;font-size:1.15rem;font-weight:600;letter-spacing:.35em;
  color:var(--gold);text-shadow:0 0 28px var(--gold-dim);white-space:nowrap}
.site-sub{font-family:'Cormorant Garamond',serif;font-size:.75rem;font-weight:300;
  letter-spacing:.2em;color:var(--text-dim);white-space:nowrap}
.demo-badge{margin-left:8px;padding:3px 10px;background:rgba(201,168,76,.15);
  border:1px solid var(--gold-dim);border-radius:2px;font-family:'Cinzel',serif;
  font-size:.6rem;letter-spacing:.18em;color:var(--gold)}
.nav-add{padding:6px 16px;border:1px solid var(--border);border-radius:2px;
  background:var(--gold-glow);font-family:'Cormorant Garamond',serif;font-size:.9rem;
  letter-spacing:.1em;color:var(--text);cursor:pointer;transition:.2s;margin-left:auto}
.nav-add:hover{border-color:var(--gold-dim);color:var(--gold)}
.search-wrap{position:relative}
#search{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:2px;
  color:var(--text);font-family:'Cormorant Garamond',serif;font-size:.95rem;letter-spacing:.05em;
  padding:7px 14px;width:220px;outline:none;transition:.25s}
#search::placeholder{color:var(--text-dim)}
#search:focus{border-color:var(--gold-dim);background:rgba(255,255,255,.06)}
#search-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg3);
  border:1px solid var(--border);border-radius:2px;list-style:none;max-height:220px;
  overflow-y:auto;z-index:300;display:none}
#search-results.visible{display:block}
#search-results li{padding:9px 14px;cursor:pointer;font-family:'Cormorant Garamond',serif;
  font-size:1rem;border-bottom:1px solid var(--border);transition:.15s}
#search-results li:hover{background:var(--gold-glow);color:var(--gold)}
.legend{display:flex;gap:18px;align-items:center}
.leg{display:flex;align-items:center;gap:5px;font-family:'Cormorant Garamond',serif;
  font-size:.78rem;color:var(--text-dim);letter-spacing:.06em}
.leg-line{width:18px;height:2px;border-radius:1px}
.leg-line.m{background:#c9a84c}.leg-line.p{background:#6ab4d8}.leg-line.s{background:#9b8ec4}

/* GRAPH */
#graph-container{position:fixed;top:var(--header-h);left:0;right:0;bottom:0}
#graph{width:100%;height:100%;cursor:grab}
#graph:active{cursor:grabbing}
#zoom-btns{position:absolute;bottom:28px;right:28px;display:flex;flex-direction:column;gap:4px}
#zoom-btns button{width:34px;height:34px;background:rgba(14,16,24,.9);border:1px solid var(--border);
  color:var(--gold);font-size:1rem;cursor:pointer;border-radius:2px;
  display:flex;align-items:center;justify-content:center;transition:.2s}
#zoom-btns button:hover{background:var(--gold-glow);border-color:var(--gold-dim)}

/* PANEL */
#panel{position:fixed;top:var(--header-h);right:0;bottom:0;width:var(--panel-w);
  background:linear-gradient(160deg,var(--bg2) 0%,var(--bg3) 100%);
  border-left:1px solid var(--border);z-index:150;overflow-y:auto;
  transform:translateX(100%);transition:transform .35s var(--ease)}
#panel.open{transform:translateX(0);box-shadow:-20px 0 60px rgba(0,0,0,.65)}
#panel-close{position:sticky;top:0;display:block;margin-left:auto;padding:14px 18px;
  background:transparent;border:none;color:var(--text-dim);font-size:1rem;cursor:pointer;transition:.2s}
#panel-close:hover{color:var(--gold)}
#panel-content{padding:0 30px 48px}
.panel-avatar{width:100%;aspect-ratio:4/3;margin-bottom:24px;background:var(--bg3);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:4rem;position:relative;overflow:hidden}
.panel-avatar::after{content:'';position:absolute;inset:0;
  background:linear-gradient(to top,var(--bg2) 0%,transparent 55%)}
.panel-name{font-family:'Cinzel',serif;font-size:1.25rem;font-weight:600;
  color:var(--gold);letter-spacing:.08em;margin-bottom:5px;line-height:1.3}
.panel-dates{font-family:'Cormorant Garamond',serif;font-size:.9rem;
  color:var(--text-dim);letter-spacing:.12em;margin-bottom:18px}
.panel-div{border:none;border-top:1px solid var(--border);margin:18px 0}
.panel-bio{font-family:'EB Garamond',serif;font-size:1.05rem;line-height:1.8;
  color:var(--text);font-style:italic}
.panel-relatives{margin-top:24px}
.panel-relatives h3{font-family:'Cormorant Garamond',serif;font-size:.72rem;
  letter-spacing:.22em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px}
.panel-relatives ul{list-style:none;display:flex;flex-wrap:wrap;gap:7px}
.panel-relatives li{padding:5px 13px;border:1px solid var(--border);border-radius:2px;
  font-family:'Cormorant Garamond',serif;font-size:.9rem;color:var(--text-dim);
  cursor:pointer;transition:.2s}
.panel-relatives li:hover{color:var(--gold);border-color:var(--gold-dim);background:var(--gold-glow)}
.rel-type{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;
  opacity:.6;display:block;margin-top:1px}
.demo-note{margin-top:24px;padding:12px 16px;background:rgba(201,168,76,.08);
  border:1px solid var(--gold-dim);border-radius:2px;font-family:'Cormorant Garamond',serif;
  font-size:.88rem;color:var(--gold);line-height:1.6}

/* OVERLAY */
#overlay{display:none;position:fixed;inset:0;z-index:140;background:rgba(0,0,0,.45)}
#overlay.visible{display:block}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--gold-dim)}

@media(max-width:640px){:root{--panel-w:100vw}.legend,.site-sub{display:none}}
  </style>
</head>
<body>
<div id="app">
  <header id="header">
    <div class="header-inner">
      <span class="site-title">MÉMOIRES</span>
      <span class="site-sub">Arbre Généalogique</span>
      <span class="demo-badge">DÉMO</span>
      <div class="search-wrap" style="margin-left:auto">
        <input id="search" type="text" placeholder="Rechercher…" autocomplete="off"/>
        <ul id="search-results"></ul>
      </div>
      <div class="legend">
        <span class="leg"><span class="leg-line m"></span>Union</span>
        <span class="leg"><span class="leg-line p"></span>Filiation</span>
        <span class="leg"><span class="leg-line s"></span>Fratrie</span>
      </div>
    </div>
  </header>

  <div id="graph-container">
    <svg id="graph"></svg>
    <div id="zoom-btns">
      <button id="btn-in">+</button>
      <button id="btn-reset">⌖</button>
      <button id="btn-out">−</button>
    </div>
  </div>

  <aside id="panel">
    <button id="panel-close">✕</button>
    <div id="panel-content"></div>
  </aside>
  <div id="overlay"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
/* ── DONNÉES DE DÉMONSTRATION ── */
const PERSONS = [
  {id:'p1', name:'Auguste Martin',    birth:'1888', death:'1952', generation:1, emoji:'👴',
   bio:'Charpentier de métier, Auguste construisit de ses mains la maison familiale de Vaugneray en 1920. Homme taiseux mais d\'une grande tendresse, il aimait tailler le bois le soir au coin du feu.'},
  {id:'p2', name:'Jeanne Martin',     birth:'1892', death:'1968', generation:1, emoji:'👵',
   bio:'Née Perrin, Jeanne était connue dans tout le village pour ses confitures de mirabelle et son accueil chaleureux. Elle éleva cinq enfants sans jamais perdre le sourire.'},
  {id:'p3', name:'Henri Martin',      birth:'1915', death:'1982', generation:2, emoji:'👨',
   bio:'Fils aîné d\'Auguste, Henri reprit l\'atelier de charpenterie familiale après la guerre. Passionné de pêche à la mouche, il disparut un matin de juin sur les bords de la Brévenne.'},
  {id:'p4', name:'Suzanne Bouchard',  birth:'1918', death:'2001', generation:2, emoji:'👩',
   bio:'Institutrice pendant trente ans à l\'école du village, Suzanne marqua des générations d\'enfants par sa pédagogie bienveillante. Elle adorait les roses et son jardin était légendaire.'},
  {id:'p5', name:'Louise Martin',     birth:'1920', death:'2015', generation:2, emoji:'👩',
   bio:'Sœur cadette d\'Henri, Louise fut infirmière à l\'Hôtel-Dieu de Lyon pendant toute sa carrière. Elle ne se maria jamais et consacra sa retraite à la peinture aquarelle.'},
  {id:'p6', name:'Pierre Martin',     birth:'1944', death:'', generation:3, emoji:'👨',
   bio:'Ingénieur en mécanique formé à l\'INSA de Lyon, Pierre a travaillé toute sa vie pour Berliet puis Renault Trucks. Amateur de montagne, il a gravi le Mont-Blanc à deux reprises.'},
  {id:'p7', name:'Claire Renaud',     birth:'1947', death:'', generation:3, emoji:'👩',
   bio:'Professeure de lettres au lycée Ampère, Claire a transmis sa passion de la littérature à des centaines d\'élèves. Elle anime encore aujourd\'hui un club de lecture mensuel.'},
  {id:'p8', name:'Michel Martin',     birth:'1948', death:'', generation:3, emoji:'👨',
   bio:'Frère cadet de Pierre, Michel a suivi une carrière de médecin généraliste à Tassin-la-Demi-Lune. Il est aujourd\'hui à la retraite et cultive un vaste potager.'},
  {id:'p9', name:'Sophie Martin',     birth:'1972', death:'', generation:4, emoji:'👩',
   bio:'Architecte installée à Lyon, Sophie a conçu plusieurs bâtiments remarquables dans le quartier de la Confluence. Elle partage sa vie entre la ville et la maison familiale de Vaugneray.'},
  {id:'p10',name:'Thomas Martin',     birth:'1975', death:'', generation:4, emoji:'👨',
   bio:'Développeur informatique indépendant, Thomas a vécu au Japon pendant cinq ans avant de revenir s\'installer à Lyon. Grand voyageur et amateur de photographie argentique.'},
  {id:'p11',name:'Lucie Fontaine',    birth:'1974', death:'', generation:4, emoji:'👩',
   bio:'Lucie est vétérinaire et gère une clinique à Vaugneray. Elle a rencontré Thomas lors d\'une randonnée dans le Vercors en 1999.'},
  {id:'p12',name:'Émile Martin',      birth:'2002', death:'', generation:5, emoji:'🧑',
   bio:'Fils de Thomas et Lucie, Émile prépare un BTS en informatique. Passionné de musique, il joue de la guitare dans un groupe de rock lyonnais.'},
  {id:'p13',name:'Chloé Martin',      birth:'2005', death:'', generation:5, emoji:'👧',
   bio:'Petite-fille de Pierre et Claire, Chloé est encore lycéenne. Elle excelle en mathématiques et rêve d\'intégrer Polytechnique.'},
];

const LINKS = [
  {source:'p1', target:'p2',  type:'married'},
  {source:'p1', target:'p3',  type:'parent'},
  {source:'p1', target:'p5',  type:'parent'},
  {source:'p2', target:'p3',  type:'parent'},
  {source:'p2', target:'p5',  type:'parent'},
  {source:'p3', target:'p5',  type:'sibling'},
  {source:'p3', target:'p4',  type:'married'},
  {source:'p3', target:'p6',  type:'parent'},
  {source:'p3', target:'p8',  type:'parent'},
  {source:'p4', target:'p6',  type:'parent'},
  {source:'p4', target:'p8',  type:'parent'},
  {source:'p6', target:'p8',  type:'sibling'},
  {source:'p6', target:'p7',  type:'married'},
  {source:'p6', target:'p9',  type:'parent'},
  {source:'p7', target:'p9',  type:'parent'},
  {source:'p10',target:'p11', type:'married'},
  {source:'p8', target:'p10', type:'parent'},
  {source:'p10',target:'p12', type:'parent'},
  {source:'p11',target:'p12', type:'parent'},
  {source:'p9', target:'p13', type:'parent'},
  {source:'p12',target:'p13', type:'sibling'},
];

const LINK_COLOR = {married:'#c9a84c', parent:'#6ab4d8', sibling:'#9b8ec4'};
const REL = {
  married:{f:'Conjoint(e)',b:'Conjoint(e)'},
  parent: {f:'Enfant',    b:'Parent'},
  sibling:{f:'Frère/Sœur',b:'Frère/Sœur'},
};

const $ = id => document.getElementById(id);
let svgRoot, zoomGroup, zoomBeh, simulation, selectedId=null;

/* ── BUILD GRAPH ── */
function build() {
  const cont = $('graph-container');
  const W = cont.clientWidth, H = cont.clientHeight;
  svgRoot = d3.select('#graph').attr('width',W).attr('height',H);

  const defs = svgRoot.append('defs');
  const filt = defs.append('filter').attr('id','glow').attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
  filt.append('feGaussianBlur').attr('stdDeviation','5').attr('result','blur');
  const fm = filt.append('feMerge');
  fm.append('feMergeNode').attr('in','blur');
  fm.append('feMergeNode').attr('in','SourceGraphic');

  zoomGroup = svgRoot.append('g');

  const nodes = PERSONS.map(p=>({...p}));
  const nMap = {}; nodes.forEach(n=>nMap[n.id]=n);
  const links = LINKS.map(l=>({...l, source:nMap[l.source], target:nMap[l.target]}));

  const gMax = d3.max(nodes, n=>n.generation)||1;
  simulation = d3.forceSimulation(nodes)
    .force('link',    d3.forceLink(links).id(d=>d.id).distance(d=>d.type==='married'?85:145))
    .force('charge',  d3.forceManyBody().strength(-280))
    .force('center',  d3.forceCenter(W/2, H/2))
    .force('collide', d3.forceCollide(58))
    .force('gen-y',   d3.forceY(n => H*0.12 + ((n.generation||1)-1)/gMax * H*0.76).strength(0.2));

  const linkSel = zoomGroup.append('g').selectAll('line').data(links).enter().append('line')
    .attr('stroke', d=>LINK_COLOR[d.type]||'#666')
    .attr('stroke-width', d=>d.type==='married'?2:1.5)
    .attr('stroke-opacity',.5)
    .attr('stroke-dasharray', d=>d.type==='sibling'?'5,3':null);

  const nodeSel = zoomGroup.append('g').selectAll('g').data(nodes).enter().append('g')
    .style('cursor','pointer')
    .call(d3.drag().on('start',ds).on('drag',dd).on('end',de))
    .on('click',(e,d)=>{e.stopPropagation();openPanel(d.id);});

  nodeSel.append('circle').attr('r',36).attr('fill','none')
    .attr('stroke','#c9a84c').attr('stroke-width',0).attr('opacity',0).attr('class','glow-r');
  nodeSel.append('circle').attr('class','node-bg').attr('r',30)
    .attr('fill','#161924')
    .attr('stroke', d=>d.death?'rgba(140,120,80,.5)':'rgba(201,168,76,.6)')
    .attr('stroke-width',2);

  nodeSel.each(function(d){
    const g = d3.select(this);
    g.append('circle').attr('r',30).attr('fill','#1e2230');
    g.append('text').attr('text-anchor','middle').attr('dy','0.38em')
      .attr('font-size','20px').attr('pointer-events','none').text(d.emoji);
  });

  nodeSel.append('text').attr('y',44).attr('text-anchor','middle')
    .attr('font-family','Cormorant Garamond,serif').attr('font-size','12px')
    .attr('fill','#c8bfa8').attr('pointer-events','none')
    .text(d=>{const p=d.name.split(' ');return p.length<=2?d.name:p[0]+' '+p[p.length-1];});

  nodeSel
    .on('mouseenter',function(_,d){
      d3.select(this).select('.node-bg').attr('stroke','#c9a84c').attr('stroke-width',3);
      d3.select(this).select('.glow-r').transition().duration(200).attr('opacity',.35).attr('stroke-width',2.5);
    })
    .on('mouseleave',function(_,d){
      if(selectedId!==d.id){
        d3.select(this).select('.node-bg').attr('stroke',d.death?'rgba(140,120,80,.5)':'rgba(201,168,76,.6)').attr('stroke-width',2);
        d3.select(this).select('.glow-r').transition().duration(200).attr('opacity',0).attr('stroke-width',0);
      }
    });

  simulation.on('tick',()=>{
    linkSel.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
           .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    nodeSel.attr('transform',d=>`translate(${d.x},${d.y})`);
  });

  zoomBeh = d3.zoom().scaleExtent([.1,3]).on('zoom',e=>zoomGroup.attr('transform',e.transform));
  svgRoot.call(zoomBeh);
  svgRoot.on('click',closePanel);

  window.addEventListener('resize',()=>{
    const W2=cont.clientWidth,H2=cont.clientHeight;
    svgRoot.attr('width',W2).attr('height',H2);
    simulation.force('center',d3.forceCenter(W2/2,H2/2)).alpha(.1).restart();
  });
}

function ds(e,d){if(!e.active)simulation.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;}
function dd(e,d){d.fx=e.x;d.fy=e.y;}
function de(e,d){if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null;}

/* ── PANEL ── */
function openPanel(id){
  const p=PERSONS.find(x=>x.id===id); if(!p) return;
  if(selectedId) unhighlight(selectedId);
  selectedId=id; highlight(id);

  const rels=[];
  LINKS.forEach(l=>{
    const sid=l.source?.id||l.source, tid=l.target?.id||l.target;
    if(sid===id){const o=PERSONS.find(x=>x.id===tid);if(o)rels.push({person:o,type:l.type,dir:'f'});}
    if(tid===id){const o=PERSONS.find(x=>x.id===sid);if(o)rels.push({person:o,type:l.type,dir:'b'});}
  });

  const dates=[p.birth?`✦ ${p.birth}`:'',p.death?`† ${p.death}`:''].filter(Boolean).join('  —  ');
  const relsHTML=rels.length?`<div class="panel-relatives"><h3>Liens familiaux</h3><ul>${
    rels.map(r=>`<li onclick="openPanel('${r.person.id}')">${r.person.name}<span class="rel-type">${(REL[r.type]||{})[r.dir]||r.type}</span></li>`).join('')
  }</ul></div>`:'';

  $('panel-content').innerHTML=`
    <div class="panel-avatar">${p.emoji}</div>
    <div class="panel-name">${p.name}</div>
    ${dates?`<div class="panel-dates">${dates}</div>`:''}
    <hr class="panel-div"/>
    <p class="panel-bio">${p.bio}</p>
    ${relsHTML}
    <div class="demo-note">✦ Dans la version finale, cette fiche affichera tes vraies photos de famille.</div>
  `;

  $('panel').classList.add('open');
  $('overlay').classList.add('visible');
  svgRoot.transition().duration(500).call(zoomBeh.translateTo,p.x+(window.innerWidth>640?215:0),p.y);
}

function closePanel(){
  $('panel').classList.remove('open');
  $('overlay').classList.remove('visible');
  if(selectedId){unhighlight(selectedId);selectedId=null;}
}
function highlight(id){
  const n=d3.select(`[id='node-${id}']`)||d3.selectAll('.node-bg').filter(d=>d.id===id);
  d3.selectAll('g').filter(d=>d&&d.id===id).select('.node-bg').attr('stroke','#c9a84c').attr('stroke-width',3);
  d3.selectAll('g').filter(d=>d&&d.id===id).select('.glow-r').attr('opacity',.4).attr('stroke-width',3);
}
function unhighlight(id){
  const p=PERSONS.find(x=>x.id===id);
  d3.selectAll('g').filter(d=>d&&d.id===id).select('.node-bg')
    .attr('stroke',p?.death?'rgba(140,120,80,.5)':'rgba(201,168,76,.6)').attr('stroke-width',2);
  d3.selectAll('g').filter(d=>d&&d.id===id).select('.glow-r').attr('opacity',0).attr('stroke-width',0);
}
window.openPanel = openPanel;

/* ── SEARCH ── */
const inp=$('search'),res=$('search-results');
inp.addEventListener('input',()=>{
  const q=inp.value.trim().toLowerCase(); res.innerHTML='';
  if(!q){res.className='';return;}
  const m=PERSONS.filter(p=>p.name.toLowerCase().includes(q)).slice(0,8);
  if(!m.length){res.className='';return;}
  m.forEach(p=>{
    const li=document.createElement('li');li.textContent=p.name;
    li.onclick=()=>{openPanel(p.id);inp.value='';res.className='';};
    res.appendChild(li);
  });
  res.className='visible';
});
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))res.className='';});

/* ── ZOOM ── */
$('btn-in').onclick    =()=>svgRoot.transition().duration(300).call(zoomBeh.scaleBy,1.4);
$('btn-out').onclick   =()=>svgRoot.transition().duration(300).call(zoomBeh.scaleBy,.7);
$('btn-reset').onclick =()=>svgRoot.transition().duration(500).call(zoomBeh.transform,d3.zoomIdentity);
$('panel-close').onclick=e=>{e.stopPropagation();closePanel();};
$('overlay').onclick=closePanel;

build();
</script>
</body>
</html>
